<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Биология тесті - Варианттар</title>
</head>
<body>
    <div id="authOverlay">
        <div class="auth-box">
            <h2>🧬 Биология тесті</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Құпия сөз">
            <button id="authBtn">Кіру / Тіркелу</button>
            <p id="authStatus"></p>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div class="top-bar">
            <div class="user-info">
                <span id="userEmail"></span>
                <button id="logoutBtn">Шығу</button>
            </div>
        </div>
        
        <div id="sidebar"></div>
        <div id="variantContent"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
